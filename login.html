<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vivero Pablo</title>

    <link rel="shortcut icon" href="./img/logo - copia.png" type="image/x-icon">

    <link rel="stylesheet" href="./css/misEstilos.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    
</head>

<body>

    <section class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="card shadow login-card p-4">

            <div class="text-center mb-4">
                <img src="./img/logo.png" width="120">
                <h2 class="mt-3">Iniciar sesión</h2>
                <p class="text-muted">
                    Bienvenido a Vivero Pablo
                </p>
            </div>

            <form id="form-login">

                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input 
                        type="email" 
                        id="correo"
                        class="form-control"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input 
                        type="password"
                        id="password"
                        class="form-control"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-verde w-100">
                    Entrar
                </button>

            </form>

            <div class="text-center mt-4">
                <p class="mb-0">
                    ¿No tienes cuenta?
                    <a href="registro.html">
                        Regístrate
                    </a>
                </p>
            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="login.js"></script>

</body>
</html>
