<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivero Pablo</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./img/logo - copia.png" type="image/x-icon">

    <!-- Css -->
    <link rel="stylesheet" href="./css/misEstilos.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />    


</head>
<body>
    <!-- menu  -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">

            <a class="navbar-brand ms-4" href="#">
                <img src="./img/logo.png" alt="Logo Vivero Pablo" width="100">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavDropdown">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="#nosotros">Nosotros</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Catálogo
                        </a>

                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#cactus">Cactus y Suculentas</a></li>
                            <li><a class="dropdown-item" href="#interior">Plantas de Interior</a></li>
                            <li><a class="dropdown-item" href="#exterior">Plantas de Exterior</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#mensajes">Mensajes</a>
                    </li>

                </ul>

                <button onclick="cerrarSesion()" class="btn btn-outline-danger me-4">
                    Cerrar sesión
                </button>

            </div>
        </div>
    </nav>

    <section class="py-5 fondo-admin">
        <div class="container d-flex justify-content-center">

            <div class="panel-admin shadow-lg p-5">

                <div class="mb-5 text-center">
                    <h1 class="titulo-admin">
                        Panel de Control
                    </h1>

                    <p class="subtitulo-admin">
                        Agrega nuevas plantas al inventario
                    </p>
                </div>

                <form id="form-planta" class="row g-4">

                    <div class="col-md-8">
                        <label class="form-label">Nombre de la planta</label>

                        <input 
                            type="text"
                            id="p-nombre"
                            class="form-control input-admin"
                            placeholder="Ej. Yuca"
                            required
                        >
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Precio</label>

                        <input 
                            type="number"
                            id="p-precio"
                            class="form-control input-admin"
                            placeholder="$0.00"
                            required
                        >
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Categoría</label>

                        <select id="p-categoria" class="form-select input-admin">
                            <option value="Cactus">Cactus y Suculentas</option>
                            <option value="Interior">Interior</option>
                            <option value="Exterior">Exterior</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Imagen</label>

                        <input 
                            type="text"
                            id="p-url"
                            class="form-control input-admin"
                            placeholder="https://imagen.jpg"
                            required
                        >
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn boton-admin w-100">
                            <i class="fa-solid fa-plus"></i>
                            Guardar planta
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </section>

    <!-- Catalogo cactus -->
    <section id="cactus" class="py-5">
        <div class="container">
           <h2 class="mb-4">CACTUS Y SUCULENTAS</h2>
           <div class="catalogo-scroll" id="contenedor-cactus">
           </div>
        </div>
    </section>

    <!-- Catalogo inteior-->
    <section id="interior" class="py-5">
        <div class="container">
            <h2 class="mb-4">PLANTAS DE INTERIOR</h2>
           <div class="catalogo-scroll" id="contenedor-interior">
           </div>
        </div>
    </section>

    <!-- Catalogo Exterior -->
    <section class="py-5" id="exterior">
        <div class="container">
            <h2 class="mb-4">PLANTAS DE EXTERIOR</h2>
           <div class="catalogo-scroll" id="contenedor-exterior">
           </div>
        </div>
    </section>


    <!-- Mensajes recibidos -->
    <section id="mensajes" class="py-5">
        <div class="container">
            <h2 class="mb-4">Mensajes recibidos</h2>

            <div id="contenedor-mensajes" class="row g-4">
            </div>
        </div>
    </section>
   

    <!-- pie de pagina -->
    <div class="pie-pagina">
        <div class="container-fluid">
            <div class="row">
                <div class="col-12 d-flex justify-content-between align-items-center">
                    <p class="m-0">
                        <i class="fa-regular fa-copyright"></i> Derechos reservados 2026. Vivero Pablo
                    </p>
                    <div class="icono-redes">
                        <i class="fa-brands fa-instagram"></i> 
                        <i class="fa-brands fa-facebook"></i> 
                        <i class="fa-brands fa-whatsapp"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="admin.js"></script> ```

</body>
</html>
